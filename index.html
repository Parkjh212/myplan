<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영상 제작 매니저</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ac:#5b5bd6;--ac-dim:rgba(91,91,214,.1);--ac-border:rgba(91,91,214,.3);
  --green:#16a34a;--green-dim:#dcfce7;
  --red:#dc2626;--red-dim:#fee2e2;
  --amber:#d97706;--amber-dim:#fef3c7;
  --blue:#2563eb;--blue-dim:#dbeafe;
  --fn:'Noto Sans KR',system-ui,sans-serif;
  --rad:14px;--rad-sm:10px;--rad-xs:8px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);
  --bg:#f8fafc;--card:#ffffff;--txt:#1e293b;--txt-dim:#64748b;
}
body{font-family:var(--fn);background:var(--bg);color:var(--txt);line-height:1.5;overflow-x:hidden}
button,input,textarea,select{font-family:inherit;color:inherit}
.safe-top{height:env(safe-area-inset-top,0)}
.safe-btm{height:env(safe-area-inset-bottom,0)}

/* Header */
header{background:#fff;padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:6px}

/* Calendar Grid */
.cal-wrap{background:#fff;margin:12px;border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f1f5f9;border-bottom:1px solid #e2e8f0}
.cal-head div{padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--txt-dim)}
.cal-head div:first-child{color:var(--red)} /* Sunday */

.cal-body{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(80px, auto)}
.day{border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;padding:6px;min-height:80px;position:relative;cursor:pointer}
.day:nth-child(7n){border-right:none}
.day:nth-child(7n+1) .d-num{color:var(--red)} /* Sunday color */
.day.off{background:#f8fafc;color:#cbd5e1}
.day.today{background:var(--ac-dim)}
.day.today .d-num{background:var(--ac);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center}
.d-num{font-size:13px;font-weight:500;margin-bottom:4px;display:block}

/* Tasks in Calendar */
.t-bar{font-size:10px;padding:2px 4px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;background:var(--ac)}
.t-bar.collab{background:var(--amber)}

/* Floating Action Button */
.fab{position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom,0));width:56px;height:56px;border-radius:28px;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(91,91,214,0.4);border:none;cursor:pointer;z-index:90}

/* Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:#fff;width:100%;max-height:92vh;border-radius:20px 20px 0 0;padding:20px;overflow-y:auto;position:relative}
.modal-fixed{height:85vh} /* Fixed size for consistency */
.m-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;font-size:24px;padding:4px}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid #e2e8f0;padding-bottom:10px}
.tab{padding:8px 12px;font-size:14px;border-radius:var(--rad-sm);cursor:pointer;background:#f1f5f9;color:var(--txt-dim);border:none}
.tab.active{background:var(--ac);color:#fff}

/* Form */
.form-group{margin-bottom:16px}
.label{display:block;font-size:13px;font-weight:600;color:var(--txt-dim);margin-bottom:6px}
.input{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:var(--rad-sm);font-size:15px;outline:none}
.input:focus{border-color:var(--ac)}
.row{display:flex;gap:12px}
.col{flex:1}

/* Collab Specific */
.collab-area{background:var(--amber-dim);padding:12px;border-radius:var(--rad-sm);border:1px solid var(--amber);margin-bottom:16px;display:none}
.collab-area.show{display:block}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer}
.check-row input{width:18px;height:18px}

/* Status Colors */
.badge{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block}
.b-blue{background:var(--blue-dim);color:var(--blue)}
.b-green{background:var(--green-dim);color:var(--green)}
.b-amber{background:var(--amber-dim);color:var(--amber)}

/* List View */
.list-item{background:#fff;margin:0 12px 12px;padding:16px;border-radius:var(--rad);box-shadow:var(--sh);display:flex;flex-direction:column;gap:8px}
.l-top{display:flex;justify-content:space-between;align-items:flex-start}
.l-title{font-weight:600;font-size:16px}
.l-sub{font-size:13px;color:var(--txt-dim)}

/* AI Analysis Box */
.ai-box{background:#f0f9ff;border:1px dashed #0ea5e9;padding:12px;border-radius:var(--rad-sm);margin-top:10px;font-size:13px}
.ai-loading{animation:pulse 1.5s infinite;color:var(--blue)}
@keyframes pulse{0%{opacity:0.5} 50%{opacity:1} 100%{opacity:0.5}}

.btn-main{width:100%;padding:16px;background:var(--ac);color:#fff;border:none;border-radius:var(--rad-sm);font-weight:700;font-size:16px;margin-top:10px}
.btn-del{width:100%;padding:12px;background:#fff;color:var(--red);border:1px solid var(--red);border-radius:var(--rad-sm);font-weight:600;margin-top:8px}

</style>
</head>
<body>

<header>
  <div class="logo">🎬 영상 제작 매니저</div>
  <div id="month-display" style="font-weight:600">2024년 5월</div>
</header>

<div class="cal-wrap">
  <div class="cal-head">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>
  <div class="cal-body" id="calendar-grid"></div>
</div>

<div id="task-list">
  <!-- Task items will appear here -->
</div>

<button class="fab" onclick="openTaskModal()">＋</button>

<!-- Task Add/Edit Modal -->
<div class="overlay" id="task-modal-overlay">
  <div class="modal modal-fixed" id="task-modal">
    <div class="m-title">
      <span id="modal-title">새 작업 추가</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="setTab('basic')">기본 정보</div>
      <div class="tab" onclick="setTab('collab-ext')" id="collab-tab" style="display:none">협찬 상세</div>
      <div class="tab" onclick="setTab('content')">자료 & AI</div>
    </div>

    <div id="form-basic" class="tab-content">
      <div class="check-row" onclick="toggleCollabMode()">
        <input type="checkbox" id="is-collab">
        <label style="font-weight:700; cursor:pointer">이 작업은 브랜드 '협찬'입니다</label>
      </div>

      <div class="form-group">
        <label class="label">작업 제목 (또는 브랜드/제품명)</label>
        <input type="text" id="t-name" class="input" placeholder="영상 제목 또는 브랜드명을 입력하세요">
      </div>

      <div class="row">
        <div class="col">
          <label class="label">시작/수령일</label>
          <input type="date" id="t-start" class="input" onchange="formatWithDay(this)">
        </div>
        <div class="col">
          <label class="label">업로드 마감일</label>
          <input type="date" id="t-end" class="input" onchange="formatWithDay(this)">
        </div>
      </div>

      <div class="form-group">
        <label class="label">카테고리</label>
        <select id="t-cat" class="input">
          <!-- Sorted alphabetically in JS -->
        </select>
      </div>
    </div>

    <div id="form-collab-ext" class="tab-content" style="display:none">
      <div class="form-group">
        <label class="label">협찬 유입 경로</label>
        <input type="text" id="t-channel" class="input" placeholder="메일, DM, 플랫폼 등">
      </div>
      <div class="form-group">
        <label class="label">협찬 페이지 URL</label>
        <input type="url" id="t-url" class="input" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="label">업체 요구 링크 (구매링크 등)</label>
        <input type="url" id="t-req-link" class="input" placeholder="영상에 포함할 링크">
      </div>
      <div class="form-group">
        <label class="label">원고료 (단위: 원)</label>
        <input type="number" id="t-fee" class="input" placeholder="0">
      </div>
    </div>

    <div id="form-content" class="tab-content" style="display:none">
      <div class="form-group">
        <label class="label">가이드라인 / 요청사항 (AI 분석용)</label>
        <textarea id="t-guide" class="input" style="height:120px" placeholder="업체에서 준 가이드라인 전체를 복사해 넣으세요. AI가 분석합니다." onblur="analyzeGuide()"></textarea>
      </div>

      <div id="ai-result" class="ai-box" style="display:none">
        <div class="ai-loading" id="ai-status">AI 분석 중...</div>
        <div id="ai-content"></div>
      </div>

      <div class="form-group">
        <label class="label">제약사항 (자동 채워짐)</label>
        <input type="text" id="t-limits" class="input" placeholder="수정 횟수, 필수 키워드 등">
      </div>
      
      <div class="form-group">
        <label class="label">참고 레퍼런스 링크 (자동 추출됨)</label>
        <input type="text" id="t-ref" class="input" placeholder="유튜브 링크 등">
      </div>

      <div class="form-group">
        <label class="label">아이디어 메모 및 특이사항</label>
        <textarea id="t-notes" class="input" style="height:80px" placeholder="기획 아이디어나 주의사항 기록"></textarea>
      </div>
    </div>

    <button class="btn-main" onclick="saveTask()">작업 저장하기</button>
    <button id="del-btn" class="btn-del" style="display:none" onclick="deleteTask()">삭제하기</button>
    <div class="safe-btm"></div>
  </div>
</div>

<script>
// --- Configuration & State ---
const apiKey = ""; // Empty as per instructions
let tasks = JSON.parse(localStorage.getItem('v-tasks') || '[]');
let categories = ["브이로그", "리뷰", "정보전달", "게임", "룩북", "일상", "실험", "기타"];
let currentEditId = null;

// --- Initialization ---
window.onload = () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('t-start').value = today;
  document.getElementById('t-end').value = today;
  
  renderCalendar();
  renderList();
  updateCategoryDropdown();
};

function updateCategoryDropdown() {
  const sel = document.getElementById('t-cat');
  sel.innerHTML = '';
  // 5. 카테고리 가나다순 정렬
  categories.sort().forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.innerText = cat;
    sel.appendChild(opt);
  });
}

// 2. 날짜 선택 시 요일 표시 보조 (시각적 피드백)
function formatWithDay(el) {
  if(!el.value) return;
  const d = new Date(el.value);
  const days = ['일','월','화','수','목','금','토'];
  console.log(`${el.value} (${days[d.getDay()]})`);
}

// --- Calendar Logic ---
function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  
  document.getElementById('month-display').innerText = `${year}년 ${month + 1}월`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  // Previous month padding
  for(let i=0; i<firstDay; i++) {
    const d = document.createElement('div');
    d.className = 'day off';
    grid.appendChild(d);
  }

  for(let i=1; i<=daysInMonth; i++) {
    const d = document.createElement('div');
    d.className = 'day';
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    
    if(dateStr === new Date().toISOString().split('T')[0]) d.classList.add('today');
    
    d.innerHTML = `<span class="d-num">${i}</span>`;
    
    // 3. 날짜 클릭 시 수정 (여기서는 그날의 작업을 보거나 추가하는 트리거로 사용)
    d.onclick = () => openTaskModal(null, dateStr);

    // Show tasks
    const dayTasks = tasks.filter(t => t.start === dateStr || t.end === dateStr);
    dayTasks.forEach(t => {
      const bar = document.createElement('div');
      bar.className = `t-bar ${t.isCollab ? 'collab' : ''}`;
      bar.innerText = (t.isCollab ? '🤝 ' : '') + t.name;
      d.appendChild(bar);
    });

    grid.appendChild(d);
  }
}

function renderList() {
  const container = document.getElementById('task-list');
  container.innerHTML = '<div style="padding:16px; font-weight:700">전체 작업 목록</div>';
  
  // Sort tasks by date
  const sorted = [...tasks].sort((a,b) => new Date(a.end) - new Date(b.end));
  
  sorted.forEach(t => {
    const item = document.createElement('div');
    item.className = 'list-item';
    // 12. 협찬 목록 클릭 시 작업을 다룸 (편집 모달 오픈)
    item.onclick = () => openTaskModal(t.id);
    
    item.innerHTML = `
      <div class="l-top">
        <div class="l-title">${t.isCollab ? '<span class="badge b-amber">협찬</span> ' : ''}${t.name}</div>
        <div class="badge b-blue">${t.cat}</div>
      </div>
      <div class="l-sub">📅 마감: ${t.end}</div>
      ${t.isCollab && t.fee ? `<div class="l-sub" style="color:var(--green); font-weight:600">💰 원고료: ${Number(t.fee).toLocaleString()}원</div>` : ''}
    `;
    container.appendChild(item);
  });
}

// --- Modal Logic ---
function openTaskModal(id = null, defaultDate = null) {
  currentEditId = id;
  document.getElementById('task-modal-overlay').classList.add('open');
  document.getElementById('del-btn').style.display = id ? 'block' : 'none';
  document.getElementById('modal-title').innerText = id ? '작업 수정' : '새 작업 추가';
  setTab('basic');

  if(id) {
    const t = tasks.find(x => x.id === id);
    document.getElementById('is-collab').checked = t.isCollab;
    document.getElementById('t-name').value = t.name;
    document.getElementById('t-start').value = t.start;
    document.getElementById('t-end').value = t.end;
    document.getElementById('t-cat').value = t.cat;
    document.getElementById('t-channel').value = t.channel || '';
    document.getElementById('t-url').value = t.url || '';
    document.getElementById('t-req-link').value = t.reqLink || '';
    document.getElementById('t-fee').value = t.fee || '';
    document.getElementById('t-guide').value = t.guide || '';
    document.getElementById('t-limits').value = t.limits || '';
    document.getElementById('t-ref').value = t.ref || '';
    document.getElementById('t-notes').value = t.notes || '';
    toggleCollabMode();
  } else {
    // Reset form
    document.getElementById('is-collab').checked = false;
    document.getElementById('t-name').value = '';
    const date = defaultDate || new Date().toISOString().split('T')[0];
    document.getElementById('t-start').value = date;
    document.getElementById('t-end').value = date;
    document.getElementById('t-channel').value = '';
    document.getElementById('t-url').value = '';
    document.getElementById('t-req-link').value = '';
    document.getElementById('t-fee').value = '';
    document.getElementById('t-guide').value = '';
    document.getElementById('t-limits').value = '';
    document.getElementById('t-ref').value = '';
    document.getElementById('t-notes').value = '';
    document.getElementById('ai-result').style.display = 'none';
    toggleCollabMode();
  }
}

function closeModal() {
  document.getElementById('task-modal-overlay').classList.remove('open');
}

function setTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('form-' + tabId).style.display = 'block';
  event.currentTarget.classList.add('active');
}

// 6. 협찬 체크 시 추가 메뉴 표시
function toggleCollabMode() {
  const isCollab = document.getElementById('is-collab').checked;
  const collabTab = document.getElementById('collab-tab');
  collabTab.style.display = isCollab ? 'block' : 'none';
}

// --- AI Analysis Logic ---
// 7, 9. AI 분석 및 요약 기능
async function analyzeGuide() {
  const guideText = document.getElementById('t-guide').value;
  if(!guideText || guideText.length < 10) return;

  const resultBox = document.getElementById('ai-result');
  const status = document.getElementById('ai-status');
  const content = document.getElementById('ai-content');

  resultBox.style.display = 'block';
  status.style.display = 'block';
  content.innerHTML = '';

  const systemPrompt = `당신은 영상 제작 전문가입니다. 사용자가 입력한 협찬 가이드라인을 분석하여 다음 정보를 JSON 형식으로 추출하세요:
  1. summary: 전체 요구사항의 핵심 요약 (3문장 이내)
  2. constraints: 수정 횟수, 필수 포함 키워드, 절대 금지 사항 등 제약 조건
  3. links: 가이드라인 내 포함된 참고 레퍼런스 URL 또는 중요 링크들 (콤마로 구분)`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ parts: [{ text: guideText }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] },
        generationConfig: { responseMimeType: "application/json" }
      })
    });

    const data = await response.json();
    const result = JSON.parse(data.candidates[0].content.parts[0].text);

    status.style.display = 'none';
    content.innerHTML = `<strong>💡 AI 요약:</strong><br>${result.summary}`;
    
    // Auto-fill fields
    document.getElementById('t-limits').value = result.constraints;
    document.getElementById('t-ref').value = result.links;

  } catch (err) {
    status.innerText = "분석 중 오류가 발생했습니다. 직접 입력해주세요.";
    console.error(err);
  }
}

// --- Data Operations ---
function saveTask() {
  const task = {
    id: currentEditId || Date.now(),
    isCollab: document.getElementById('is-collab').checked,
    name: document.getElementById('t-name').value,
    start: document.getElementById('t-start').value,
    end: document.getElementById('t-end').value,
    cat: document.getElementById('t-cat').value,
    channel: document.getElementById('t-channel').value,
    url: document.getElementById('t-url').value,
    reqLink: document.getElementById('t-req-link').value,
    fee: document.getElementById('t-fee').value,
    guide: document.getElementById('t-guide').value,
    limits: document.getElementById('t-limits').value,
    ref: document.getElementById('t-ref').value,
    notes: document.getElementById('t-notes').value,
    updatedAt: Date.now()
  };

  if(!task.name) {
    alert("제목을 입력해주세요.");
    return;
  }

  if(currentEditId) {
    tasks = tasks.map(t => t.id === currentEditId ? task : t);
  } else {
    tasks.push(task);
  }

  localStorage.setItem('v-tasks', JSON.stringify(tasks));
  closeModal();
  renderCalendar();
  renderList();
}

function deleteTask() {
  if(!confirm("정말 이 작업을 삭제할까요?")) return;
  tasks = tasks.filter(t => t.id !== currentEditId);
  localStorage.setItem('v-tasks', JSON.stringify(tasks));
  closeModal();
  renderCalendar();
  renderList();
}

</script>
</body>
</html>
